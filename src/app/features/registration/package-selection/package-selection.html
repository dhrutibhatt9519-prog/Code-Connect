<section aria-labelledby="package-heading"><p class="eyebrow">Step 1 of 3</p><h2 id="package-heading">Choose your registration</h2><p class="intro">Pick the experience that works for you.</p><div class="package-grid">@for (pkg of packages(); track pkg.id) { <button type="button" class="package" [class.selected]="pkg.id === selectedId()" (click)="select(pkg.id)" [attr.aria-pressed]="pkg.id === selectedId()"><span class="radio"></span><div><h3>{{ pkg.name }}</h3><p>{{ pkg.description }}</p><ul>@for (perk of pkg.perks; track perk) { <li>{{ perk }}</li> }</ul><small>{{ pkg.available }} available</small></div><strong>{{ pkg.price === 0 ? 'Free' : (pkg.price | currency) }}</strong></button> }</div>
@if (selected()) { <div class="quantity-row"><div><label for="quantity">Number of participants</label><p>Maximum {{ selected()!.available }} for this package</p></div><select id="quantity" class="select" [value]="quantity()" (change)="updateQuantity($any($event.target).value)">@for (value of quantityOptions(); track value) { <option [value]="value">{{ value }}</option> }</select></div><div class="total"><span>Subtotal</span><strong>{{ selected()!.price * quantity() | currency }}</strong></div> }
</section>
